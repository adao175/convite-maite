<meta name="twitter:description" content="Você é nosso convidado especial! 06 de Junho de 2026 · A partir das 15h30 · Feast House, Aracaju SE">
<meta name="twitter:image"       content="https://images.unsplash.com/photo-1695482921526-d9bba07d0424?w=1200&h=630&fit=crop&q=80">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose:       #c9849b;
    --rose-dark:  #9e6678;
    --rose-pale:  #f2e2e9;
    --gold:       #c9a84c;
    --gold-light: #e8d9c0;
    --cream:      #faf6f1;
    --green:      #7a9e7e;
    --text:       #4a4039;
    --text-light: #8a7870;
  }

  html, body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Jost', sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Fundo ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-layer svg { width: 100%; height: 100%; }

  /* ── Brilhos ── */
  #sparkles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .sparkle {
    position: absolute;
    pointer-events: none;
    border-radius: 50%;
    animation: twinkle ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: .15; transform: scale(.7); }
    50%      { opacity: .90; transform: scale(1.4); }
  }

  /* ── Partículas flutuantes ── */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: drift linear infinite;
    opacity: 0;
  }
  @keyframes drift {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    10%  { opacity: .7; }
    90%  { opacity: .5; }
    100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
  }

  /* ── Insetos ── */
  #insetos {
    position: fixed;
    inset: 0;
    z-index: 15;
    pointer-events: none;
  }
  .bug {
    position: absolute;
    pointer-events: none;
    will-change: transform;
    line-height: 1;
  }

  /* ── Card ── */
  .card-wrap {
    position: relative;
    z-index: 10;
    max-width: 460px;
    margin: 36px auto 60px;
    padding: 0 14px;
  }

  .card {
    background: #fff;
    border: 1px solid rgba(201,168,76,.30);
    border-radius: 28px;
    padding: 40px 36px 36px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(74,64,57,.08), 0 4px 16px rgba(74,64,57,.04);
    position: relative;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: .75px solid rgba(201,168,76,.18);
    border-radius: 20px;
    pointer-events: none;
  }

  /* ── Ornamento topo ── */
  .ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: .18em;
  }
  .ornament::before, .ornament::after {
    content: "";
    display: block;
    width: 44px;
    height: .75px;
  }
  .ornament::before { background: linear-gradient(to right, transparent, var(--gold)); }
  .ornament::after  { background: linear-gradient(to left,  transparent, var(--gold)); }

  /* ── Tipografia ── */
  .tag-evento {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .22em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(38px, 10vw, 46px);
    font-weight: 500;
    color: var(--rose-dark);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .subtitulo {
    font-size: clamp(12px, 3.2vw, 13px);
    font-weight: 300;
    color: var(--text-light);
    letter-spacing: .03em;
    margin-bottom: 16px;
  }
  .nome {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(24px, 6.5vw, 28px);
    font-weight: 500;
    color: var(--rose);
    margin-bottom: 26px;
    line-height: 1.2;
  }

  /* ── Divisor ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 auto 22px;
    width: 55%;
  }
  .divider::before, .divider::after {
    content: "";
    flex: 1;
    height: .75px;
    background: var(--gold-light);
  }
  .divider span { font-size: 13px; }

  /* ── Info data / local / horário ── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .info-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .info-label {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .info-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(16px, 4.2vw, 19px);
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }

  /* ── Countdown ── */
  .countdown {
    display: flex;
    gap: 7px;
    margin-bottom: 24px;
  }
  .count-box {
    flex: 1;
    background: var(--cream);
    border: .75px solid rgba(201,168,76,.20);
    border-radius: 14px;
    padding: 12px 6px 10px;
  }
  .count-num {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(26px, 7vw, 30px);
    font-weight: 600;
    color: var(--rose-dark);
    line-height: 1;
    margin-bottom: 4px;
  }
  .count-label {
    display: block;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--text-light);
  }

  /* ── Mapa ── */
  .mapa-wrap {
    border-radius: 16px;
    overflow: hidden;
    border: .75px solid rgba(201,168,76,.20);
    margin-bottom: 12px;
  }
  .mapa-wrap iframe {
    width: 100%;
    height: 155px;
    display: block;
    border: none;
  }

  /* ── Botões ── */
  .btn-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    z-index: 50;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 15px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-family: 'Jost', sans-serif;
    font-size: clamp(12px, 3.5vw, 13px);
    font-weight: 500;
    letter-spacing: .07em;
    text-align: center;
    cursor: pointer;
    transition: transform .2s ease, box-shadow .2s ease;
    position: relative;
    z-index: 50;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    touch-action: manipulation;
  }
  .btn:hover  { transform: translateY(-2px); }
  .btn:active { transform: scale(.98); }

  .btn-mapa {
    background: #fff;
    color: var(--rose-dark);
    border: 1px solid rgba(201,168,76,.40);
    box-shadow: 0 2px 8px rgba(74,64,57,.06);
  }
  .btn-mapa:hover { background: var(--cream); box-shadow: 0 4px 16px rgba(74,64,57,.10); }

  .btn-confirm {
    background: linear-gradient(135deg, var(--rose-dark) 0%, var(--rose) 100%);
    color: #fff;
    border: none;
    box-shadow: 0 4px 20px rgba(158,102,120,.35);
  }
  .btn-confirm:hover { box-shadow: 0 6px 28px rgba(158,102,120,.45); }

  /* ── Rodapé ── */
  .card-footer {
    margin-top: 20px;
    font-size: 11px;
    color: var(--text-light);
    letter-spacing: .06em;
  }

  /* ── Botão música ── */
  .music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    width: 50px;
    height: 50px;
    border: .75px solid rgba(201,168,76,.30);
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 4px 18px rgba(74,64,57,.14);
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, box-shadow .2s;
    touch-action: manipulation;
  }
  .music-btn:hover { transform: scale(1.06); box-shadow: 0 6px 24px rgba(74,64,57,.20); }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .card-wrap { margin: 16px auto 40px; padding: 0 10px; }
    .card { padding: 32px 20px 28px; border-radius: 22px; }
    .card::before { inset: 8px; }
    .info-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-grid .info-item:last-child {
      grid-column: 1 / -1;
    }
    .mapa-wrap iframe { height: 140px; }
    .btn { padding: 16px 16px; }
    .ornament::before, .ornament::after { width: 32px; }
  }

  @media (max-width: 360px) {
    .card { padding: 28px 14px 24px; }
    .countdown { gap: 5px; }
    .count-box { padding: 10px 4px 8px; }
  }
</style>
</head>
<body>

<!-- Fundo decorativo -->
<div class="bg-layer" aria-hidden="true">
  <svg viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="900" fill="#faf6f1"/>
    <path d="M0 600 Q600 200 1200 600" stroke="#f0dde7" stroke-width="1.5" fill="none"/>
    <path d="M0 640 Q600 260 1200 640" stroke="#e8d9c0" stroke-width="1" fill="none" opacity=".7"/>
    <path d="M0 680 Q600 320 1200 680" stroke="#d8ecd9" stroke-width="1" fill="none" opacity=".6"/>
    <ellipse cx="600" cy="860" rx="820" ry="190" fill="#e6f0e6" opacity=".65"/>
    <!-- árvore direita -->
    <rect x="1020" y="490" width="28" height="190" rx="12" fill="#c4a882" opacity=".45"/>
    <circle cx="1034" cy="430" r="95"  fill="#f2e2e9" opacity=".50"/>
    <circle cx="1108" cy="465" r="68"  fill="#f2e2e9" opacity=".40"/>
    <circle cx="964"  cy="465" r="68"  fill="#f2e2e9" opacity=".40"/>
    <!-- árvore esquerda -->
    <rect x="148" y="555" width="22" height="145" rx="10" fill="#c4a882" opacity=".38"/>
    <circle cx="159" cy="505" r="72"  fill="#e2eddf" opacity=".48"/>
    <circle cx="214" cy="538" r="52"  fill="#e2eddf" opacity=".38"/>
    <circle cx="106" cy="538" r="52"  fill="#e2eddf" opacity=".38"/>
    <!-- flores -->
    <circle cx="90"  cy="800" r="10" fill="#f2e2e9" opacity=".9"/>
    <circle cx="130" cy="832" r="8"  fill="#e8d9c0" opacity=".9"/>
    <circle cx="58"  cy="758" r="7"  fill="#d8ecd9" opacity=".9"/>
    <circle cx="1112" cy="812" r="10" fill="#f2e2e9" opacity=".9"/>
    <circle cx="1152" cy="842" r="8"  fill="#e8d9c0" opacity=".9"/>
    <circle cx="1078" cy="768" r="7"  fill="#d8ecd9" opacity=".9"/>
  </svg>
</div>

<div id="sparkles"  aria-hidden="true"></div>
<div id="particles" aria-hidden="true"></div>
<div id="insetos"   aria-hidden="true"></div>

<div class="card-wrap">
  <div class="card">

    <div class="ornament">✦</div>

    <p class="tag-evento">Primeiro Aniversário</p>
    <h1>Jardim<br>Encantado</h1>
    <p class="subtitulo">Você é nosso convidado especial para celebrar</p>
    <p class="nome">Maitê Teles de Lima</p>

    <div class="divider"><span>🌸</span></div>

    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">Data</span>
        <span class="info-value">06 de Junho<br>de 2026</span>
      </div>
      <div class="info-item">
        <span class="info-label">Horário</span>
        <span class="info-value">A partir das<br>15h30</span>
      </div>
      <div class="info-item">
        <span class="info-label">Local</span>
        <span class="info-value">Feast House<br>Aracaju · SE</span>
      </div>
    </div>

    <div class="countdown">
      <div class="count-box"><span class="count-num" id="dias">0</span><span class="count-label">Dias</span></div>
      <div class="count-box"><span class="count-num" id="horas">0</span><span class="count-label">Horas</span></div>
      <div class="count-box"><span class="count-num" id="min">0</span><span class="count-label">Min</span></div>
    </div>

    <div class="mapa-wrap">
      <iframe
        src="https://maps.google.com/maps?q=-10.94179659532558,-37.07892436609109&z=15&output=embed"
        title="Localização Feast House"
        loading="lazy">
      </iframe>
    </div>

    <div class="btn-wrap">
      <a href="https://www.google.com/maps?q=-10.94179659532558,-37.07892436609109"
         target="_blank" rel="noopener noreferrer"
         class="btn btn-mapa">
        📍 &nbsp;Abrir no Google Maps
      </a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSfQ-3-QOm3zt_iX6BeV_1l0zCQHAzC2XwgkWnLEyNi1cQ0YEw/viewform?usp=dialog"
         target="_blank" rel="noopener noreferrer"
         class="btn btn-confirm">
        🌸 &nbsp;Confirmar Presença
      </a>
    </div>

    <p class="card-footer">Com amor, família Teles de Lima 🌿</p>

  </div>
</div>

<button class="music-btn" id="musicBtn" onclick="toggleMusica()" aria-label="Tocar música">🎵</button>

<audio id="musica" loop preload="auto">
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
/* ── Brilhos dourados e rosê ── */
(function() {
  const c = document.getElementById('sparkles');
  const configs = [
    { color: '#c9a84c', shadow: 'rgba(201,168,76,.80)',  minSize: 3, maxSize: 5 },
    { color: '#e8c97c', shadow: 'rgba(232,201,124,.70)', minSize: 2, maxSize: 4 },
    { color: '#c9849b', shadow: 'rgba(201,132,155,.80)', minSize: 3, maxSize: 5 },
    { color: '#f0b8cc', shadow: 'rgba(240,184,204,.70)', minSize: 2, maxSize: 4 },
  ];
  for (let i = 0; i < 36; i++) {
    const cfg = configs[Math.floor(Math.random() * configs.length)];
    const el  = document.createElement('div');
    el.className = 'sparkle';
    const sz = cfg.minSize + Math.random() * (cfg.maxSize - cfg.minSize);
    Object.assign(el.style, {
      width:           sz + 'px',
      height:          sz + 'px',
      background:      cfg.color,
      boxShadow:       `0 0 ${sz * 2.5}px ${cfg.shadow}`,
      left:            Math.random() * 100 + '%',
      top:             Math.random() * 100 + '%',
      animationDuration: (3 + Math.random() * 4) + 's',
      animationDelay:    (Math.random() * 5) + 's',
    });
    c.appendChild(el);
  }
})();

/* ── Partículas flutuantes rosê/dourado ── */
(function() {
  const c      = document.getElementById('particles');
  const colors = ['#f2e2e9','#f0c8d8','#e8d9c0','rgba(201,168,76,.35)','#f7e8ee'];
  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const sz = 2.5 + Math.random() * 4;
    Object.assign(el.style, {
      width:             sz + 'px',
      height:            sz + 'px',
      background:        colors[Math.floor(Math.random() * colors.length)],
      left:              Math.random() * 100 + '%',
      top:               (75 + Math.random() * 35) + '%',
      animationDuration: (9 + Math.random() * 13) + 's',
      animationDelay:    (Math.random() * 12) + 's',
    });
    c.appendChild(el);
  }
})();

/* ── Insetos ── */
(function() {
  const c     = document.getElementById('insetos');
  const tipos = [
    { emoji: '🦋', speed: .30, wobble: 20, size: [14, 18] },
    { emoji: '🐝', speed: .50, wobble:  8, size: [13, 16] },
    { emoji: '🐞', speed: .22, wobble:  6, size: [13, 16] },
    { emoji: '🪲', speed: .18, wobble:  8, size: [12, 15] },
    { emoji: '🌸', speed: .12, wobble: 25, size: [13, 17] },
  ];
  const bugs = [];
  const total = 10;

  for (let i = 0; i < total; i++) {
    const tipo = tipos[i % tipos.length];
    const el   = document.createElement('div');
    el.className  = 'bug';
    el.textContent = tipo.emoji;
    const sz = tipo.size[0] + Math.random() * (tipo.size[1] - tipo.size[0]);
    el.style.fontSize = sz + 'px';
    el.style.opacity  = (.55 + Math.random() * .35).toFixed(2);
    c.appendChild(el);
    bugs.push({
      el, tipo,
      x:     Math.random() * window.innerWidth,
      y:     Math.random() * window.innerHeight,
      angle: Math.random() * Math.PI * 2,
      speed: tipo.speed * (.8 + Math.random() * .4),
    });
  }

  function animar() {
    const W = window.innerWidth, H = window.innerHeight;
    bugs.forEach(b => {
      b.angle += 0.005 + Math.random() * .003;
      b.x += Math.cos(b.angle)       * b.speed;
      b.y += Math.sin(b.angle * 1.3) * b.speed;
      if (b.x < -40) b.x = W + 40;
      if (b.x > W+40) b.x = -40;
      if (b.y < -40) b.y = H + 40;
      if (b.y > H+40) b.y = -40;
      const rot = Math.sin(b.angle * 2) * b.tipo.wobble;
      b.el.style.transform = `translate(${b.x}px,${b.y}px) rotate(${rot}deg)`;
    });
    requestAnimationFrame(animar);
  }
  animar();
})();

/* ── Countdown ── */
const dataEvento = new Date('Jun 06, 2026 15:30:00');
function atualizar() {
  const diff = dataEvento - new Date();
  if (diff <= 0) {
    ['dias','horas','min'].forEach(id => document.getElementById(id).textContent = '0');
    return;
  }
  document.getElementById('dias').textContent  = Math.floor(diff / 86400000);
  document.getElementById('horas').textContent = Math.floor((diff % 86400000) / 3600000);
  document.getElementById('min').textContent   = Math.floor((diff % 3600000) / 60000);
}
atualizar();
setInterval(atualizar, 1000);

/* ── Música ── */
const musica   = document.getElementById('musica');
const musicBtn = document.getElementById('musicBtn');

function iniciarMusica() {
  if (musica.paused) {
    musica.volume = .22;
    musica.play().then(() => { musicBtn.textContent = '⏸'; }).catch(() => {});
  }
  window.removeEventListener('scroll',     iniciarMusica);
  window.removeEventListener('touchmove',  iniciarMusica);
  window.removeEventListener('touchstart', iniciarMusica);
  window.removeEventListener('click',      iniciarMusica);
}

window.addEventListener('scroll',     iniciarMusica, { once: true, passive: true });
window.addEventListener('touchmove',  iniciarMusica, { once: true, passive: true });
window.addEventListener('touchstart', iniciarMusica, { once: true, passive: true });
window.addEventListener('click',      iniciarMusica, { once: true });

function toggleMusica() {
  if (musica.paused) { musica.volume = .22; musica.play(); musicBtn.textContent = '⏸'; }
  else               { musica.pause();                     musicBtn.textContent = '🎵'; }
}
</script>
</body>
</html>
